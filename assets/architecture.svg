  <rect x="748" y="116" width="11" height="11" rx="1" fill="#ef4444"/>
  <rect x="761" y="116" width="11" height="11" rx="1" fill="#1a1a2e"/>
  <rect x="774" y="116" width="11" height="11" rx="1" fill="#eab308"/>
