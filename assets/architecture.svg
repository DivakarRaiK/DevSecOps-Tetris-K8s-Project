  <text x="78" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fed7aa">Service (ELB)</text>
  <!-- inner deployment 2 -->
  <rect x="134" y="94" width="88" height="92" rx="6" fill="#1a0a00" stroke="#c2410c" stroke-width="1.2"/>
  <text x="178" y="112" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="600" fill="#fb923c">Deployment</text>
  <rect x="142" y="118" width="72" height="15" rx="3" fill="#2a1200" stroke="#c2410c" stroke-width="0.6"/>
  <text x="178" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fed7aa">tetris pods</text>
  <rect x="142" y="137" width="72" height="15" rx="3" fill="#2a1200" stroke="#c2410c" stroke-width="0.6"/>
  <text x="178" y="149" text-anchor="middle" font-family="Arial, sans-serif" font-size="8.5" fill="#fed7aa">Service (ELB)</text>

