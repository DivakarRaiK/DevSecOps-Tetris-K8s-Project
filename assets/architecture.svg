  <rect x="380" y="295" width="130" height="58" rx="8" fill="#001833" stroke="#60a5fa" stroke-width="1.6"/>
  <text x="445" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#60a5fa">DockerHub</text>
  <text x="445" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bfdbfe">image pushed</text>

  <!-- NODE 8: Building Docker Image -->
  <rect x="540" y="295" width="140" height="58" rx="8" fill="#001833" stroke="#22d3ee" stroke-width="1.6"/>
  <text x="610" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#22d3ee">Building</text>
  <text x="610" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a5f3fc">Docker Image</text>

  <!-- NODE 9: SonarQube -->
  <rect x="160" y="405" width="130" height="58" rx="8" fill="#001233" stroke="#3b82f6" stroke-width="1.6"/>
  <text x="225" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#60a5fa">SonarQube</text>
  <text x="225" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#bfdbfe">code quality</text>

