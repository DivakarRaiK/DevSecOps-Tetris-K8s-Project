  <rect x="310" y="405" width="120" height="58" rx="8" fill="#1a0808" stroke="#f87171" stroke-width="1.6" stroke-dasharray="5 3"/>
  <text x="370" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#f87171">npm</text>
  <text x="370" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fca5a5">install deps</text>

