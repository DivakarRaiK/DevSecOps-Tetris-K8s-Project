  <rect x="774" y="129" width="11" height="11" rx="1" fill="#eab308"/>
  <rect x="787" y="129" width="11" height="11" rx="1" fill="#ef4444"/>
  <rect x="748" y="142" width="11" height="11" rx="1" fill="#a855f7"/>
  <rect x="761" y="142" width="11" height="11" rx="1" fill="#22c55e"/>
  <rect x="774" y="142" width="11" height="11" rx="1" fill="#3b82f6"/>
  <rect x="787" y="142" width="11" height="11" rx="1" fill="#eab308"/>
  <!-- scores -->
  <rect x="810" y="90"  width="48" height="20" rx="3" fill="#0a0a1a" stroke="#4ade80" stroke-width="0.8"/>
  <text x="834" y="104" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4ade80">SCORE 0</text>
  <rect x="810" y="114" width="48" height="20" rx="3" fill="#0a0a1a" stroke="#4ade80" stroke-width="0.8"/>
  <text x="834" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4ade80">LEVEL 1</text>
  <rect x="810" y="138" width="48" height="20" rx="3" fill="#0a0a1a" stroke="#4ade80" stroke-width="0.8"/>
  <text x="834" y="152" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#4ade80">LINES 0</text>
  <text x="800" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="#4ade80">Tetris V1 &amp; V2</text>

  <!-- ══════════════════════════════
       ARROWS — exact flow
  ═══════════════════════════════ -->

  <!-- 1. App Code → Jenkins Server (up) -->
  <path d="M85 450 L85 355" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#mo)"/>
  <text x="92" y="415" font-family="Arial, sans-serif" font-size="9" fill="#f97316">Creating Jenkins</text>
  <text x="92" y="427" font-family="Arial, sans-serif" font-size="9" fill="#f97316">via Terraform</text>

  <!-- 2. Jenkins → EKS (up, left side) -->
  <path d="M85 295 Q85 230 100 202" fill="none" stroke="#f97316" stroke-width="2" marker-end="url(#mo)"/>
  <text x="16" y="258" font-family="Arial, sans-serif" font-size="9" fill="#f97316">Creating EKS &amp;</text>
  <text x="16" y="270" font-family="Arial, sans-serif" font-size="9" fill="#f97316">NodeGroup via TF</text>

  <!-- 3. Jenkins → SonarQube (right then down) -->
  <path d="M150 324 Q190 324 190 405" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#mb)"/>

  <!-- 4. SonarQube → npm (right) -->
  <path d="M290 434 L308 434" fill="none" stroke="#c084fc" stroke-width="2" marker-end="url(#mp)"/>

  <!-- 5. npm → OWASP (right) -->
  <path d="M430 434 L448 434" fill="none" stroke="#c084fc" stroke-width="2" marker-end="url(#mp)"/>

  <!-- 6. OWASP → File Scan (right) -->
  <path d="M580 434 L598 434" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#mt)"/>

  <!-- 7. File Scan → Building Docker Image (up) -->
  <path d="M655 405 L655 370 Q655 355 682 355" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#mc)"/>

  <!-- 8. Building Docker → DockerHub (left, "image pushed") -->
  <path d="M540 324 L512 324" fill="none" stroke="#60a5fa" stroke-width="2" marker-end="url(#mb)"/>
  <text x="516" y="316" font-family="Arial, sans-serif" font-size="9" fill="#60a5fa">image pushed</text>

  <!-- 9. DockerHub → Docker Image Scan (left) -->
  <path d="M380 324 L362 324" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#mt)"/>

  <!-- 10. Docker Image Scan → Updating image name (up-right curved) -->
  <path d="M295 295 Q295 250 338 253" fill="none" stroke="#facc15" stroke-width="2" marker-end="url(#my)"/>

  <!-- 11. Updating image name → ArgoCD (up) -->
  <path d="M405 195 L405 124" fill="none" stroke="#4ade80" stroke-width="2" marker-end="url(#mg)"/>

  <!-- 12. ArgoCD → EKS Cluster (left) -->
  <path d="M340 91 Q280 91 242 110" fill="none" stroke="#34d399" stroke-width="2" marker-end="url(#mt)"/>

  <!-- 13. EKS → Live Tetris (right along top) -->
  <path d="M240 95 Q490 70 728 110" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#mg)"/>

  <!-- Footer -->
  <text x="450" y="565" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280" letter-spacing="0.4">Jenkins · ArgoCD · SonarQube · OWASP · Trivy · Docker · Terraform · AWS EKS</text>
</svg>
