  <rect x="340" y="60" width="130" height="62" rx="8" fill="#001a14" stroke="#10b981" stroke-width="1.8"/>
  <circle cx="405" cy="79" r="9" fill="#064e3b" stroke="#10b981" stroke-width="1.4"/>
  <circle cx="405" cy="79" r="3.5" fill="#34d399"/>
  <text x="405" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#34d399">ArgoCD</text>
  <text x="405" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a7f3d0">GitOps · auto-sync</text>

