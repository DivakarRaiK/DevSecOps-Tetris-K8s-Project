    <marker id="mg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#4ade80" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#34d399" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#22d3ee" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="my" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#facc15" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
    <marker id="mp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 1L9 5L1 9" fill="none" stroke="#c084fc" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#1e0a35" rx="16"/>
  <ellipse cx="220" cy="120" rx="280" ry="180" fill="#8b3cf7" fill-opacity="0.08"/>
  <ellipse cx="700" cy="460" rx="240" ry="160" fill="#1d4ed8" fill-opacity="0.08"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#e8d5ff" letter-spacing="0.6">End-to-End DevSecOps Pipeline · Tetris on AWS EKS</text>

  <!-- ══════════════════════════════
       NODE 1: App Code (bottom-left)
  ═══════════════════════════════ -->
  <rect x="30" y="450" width="110" height="54" rx="8" fill="#111827" stroke="#6b7280" stroke-width="1.5"/>
