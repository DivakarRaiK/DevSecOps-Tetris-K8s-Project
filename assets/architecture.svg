  <text x="85" y="491" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#9ca3af">GitHub repo</text>

  <!-- NODE 2: Jenkins Server EC2 (left-mid) -->
  <rect x="20" y="295" width="130" height="58" rx="8" fill="#2a1500" stroke="#f97316" stroke-width="1.8" stroke-dasharray="6 3"/>
  <text x="85" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#fb923c">Jenkins Server</text>
  <text x="85" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#fed7aa">EC2 · Terraform</text>

